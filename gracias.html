<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <title>Gracias — Clan Cervecero</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="css/clan.css">
</head>
<body class="bg-clan-dark text-white">

  <div class="min-h-screen flex items-center justify-center px-6">
    <div class="text-center max-w-md">
      <img src="assets/img/brand/logo.png" alt="Clan Cervecero" class="h-12 mx-auto mb-8 opacity-80">
      <div class="w-16 h-16 rounded-full bg-gradient-to-br from-[#c08f54] to-[#f3d39a] flex items-center justify-center mx-auto mb-6">
        <svg class="w-8 h-8 text-[#0e1415]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
      </div>
      <h1 class="text-3xl font-bold mb-4">¡Gracias por contactarnos!</h1>
      <p class="text-white/50 text-lg mb-8" style="font-family: 'DM Sans', sans-serif;">Recibimos tu solicitud. Un ejecutivo de Clan Cervecero te contactará en menos de 24 horas.</p>
      <a href="/" class="btn-gold px-8 py-4 rounded-xl inline-block text-base" style="font-family: 'DM Sans', sans-serif;">Volver al inicio</a>
    </div>
  </div>

</body>
</html>
